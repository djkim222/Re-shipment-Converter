<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스페로스페라 재출고 변환기 v2</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        h2 { text-align: center; color: #2c3e50; }
        .container { display: flex; gap: 20px; max-width: 1400px; margin: 0 auto; }
        .box { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 400px; border: 1px solid #ccc; border-radius: 4px; padding: 10px; font-family: monospace; font-size: 13px; white-space: pre; overflow-wrap: normal; overflow-x: scroll; resize: vertical; box-sizing: border-box; }
        button { display: block; width: 100%; background-color: #3498db; color: #fff; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 15px; transition: background-color 0.3s; }
        button:hover { background-color: #2980b9; }
        button.success { background-color: #2ecc71; }
        button.success:hover { background-color: #27ae60; }
        .instructions { background: #e8f4f8; padding: 15px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; color: #2c3e50; }
        .highlight { font-weight: bold; color: #e74c3c; }
    </style>
</head>
<body>

    <h2>🔄 스페로스페라 재출고 데이터 변환기 v2</h2>
    
    <div class="instructions">
        <strong>💡 업데이트 내용:</strong> 이제 <strong>internal_sku</strong>와 <strong>vendor_product_code</strong>가 빈칸 없이 마스터 데이터 기준으로 자동 매핑됩니다.<br>
        1. 삼성 발주서 양식 데이터를 복사하여 왼쪽 <strong>[입력창]</strong>에 붙여넣습니다.<br>
        2. 변환 후 결과창의 데이터를 복사하여 <span class="highlight">STANDARD_ORDERS 시트 A열</span>에 붙여넣으세요.
    </div>

    <div class="container">
        <div class="box">
            <h3>📥 입력창 (삼성 발주서 복붙)</h3>
            <textarea id="inputData" placeholder="엑셀 데이터를 붙여넣으세요..."></textarea>
            <button onclick="convertData()">마스터 데이터 기반 변환 실행 ➡️</button>
        </div>
        
        <div class="box">
            <h3>📤 결과창 (STANDARD_ORDERS 양식)</h3>
            <textarea id="outputData" placeholder="변환된 결과가 여기에 나타납니다..." readonly></textarea>
            <button id="copyBtn" class="success" onclick="copyToClipboard()">📋 결과 복사하기</button>
        </div>
    </div>

    <script>
        /**
         * 대표님이 주신 PRODUCT_MASTER 및 ALIAS 정보를 기반으로 한 지능형 매핑 데이터
         */
        const productMaster = {
            "S10_MILK": { name: "시그니처_밀크 크레이프 케이크", vCode: "434083" },
            "S10_CHOC": { name: "시그니처_초코 크레이프 케이크", vCode: "434083" },
            "S10_STRAW": { name: "시그니처_딸기 크레이프 케이크", vCode: "434083" },
            "S10_BLUE": { name: "시그니처_블루베리 크레이프 케이크", vCode: "434083" },
            "S10_BLACK": { name: "시그니처_흑임자 크레이프 케이크", vCode: "4453508" },
            "S13_ROSE_MILK": { name: "로즈 크레이프 케이크", vCode: "483854" },
            "S10_BANANA": { name: "바나나맛_크레이프 케이크", vCode: "12218925" },
            "S10_ANGMALCHA": { name: "시그니처_앙말차 크레이프 케이크", vCode: "12190430" },
            "S20_DJK": { name: "스페로스페라 두쫀쿠", vCode: "13075215" },
            "S10_MILK_BLUE_BUNDLE": { name: "밀 블", vCode: "434083" }
        };

        // 입력받은 품목명에서 SKU를 찾아내기 위한 키워드 사전
        const skuFinder = {
            "밀크": "S10_MILK",
            "초코": "S10_CHOC",
            "딸기": "S10_STRAW",
            "블루베리": "S10_BLUE",
            "흑임자": "S10_BLACK",
            "로즈": "S13_ROSE_MILK",
            "바나나": "S10_BANANA",
            "앙말차": "S10_ANGMALCHA",
            "두쫀쿠": "S20_DJK",
            "두바이": "S20_DJK",
            "밀   블": "S10_MILK_BLUE_BUNDLE",
            "밀 블": "S10_MILK_BLUE_BUNDLE"
        };

        function getTodayString() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }

        function convertData() {
            const input = document.getElementById('inputData').value.trim();
            if (!input) { alert("입력 데이터가 없습니다!"); return; }

            const lines = input.split('\n');
            let outputRows = [];
            const todayStr = getTodayString();

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line || (i === 0 && line.includes("품목명"))) continue;
                
                const cols = line.split('\t');
                
                // 1. 원본 데이터 파싱
                const rawItemName = (cols[0] || "").trim();
                const qty = (cols[1] || "1").trim();
                const orderNo = (cols[2] || "").trim();
                const recipient = (cols[3] || "").trim();
                const phone = (cols[4] || "").trim();
                const zipcode = (cols[5] || "").trim();
                const address = (cols[6] || "").trim();
                const channel = (cols[7] || "수동재출고").trim();
                const message = (cols[8] || "").trim();
                const subOrderNo = (cols[9] || "").trim();

                // 2. 마스터 데이터 매핑 (핵심 로직)
                let internalSku = "";
                let samsungItemName = rawItemName;
                let vendorProductCode = "";

                // 품목명에서 키워드 추출하여 SKU 탐색
                for (let key in skuFinder) {
                    if (rawItemName.includes(key)) {
                        internalSku = skuFinder[key];
                        break;
                    }
                }

                // SKU를 찾았다면 마스터 정보에서 정식 명칭과 코드 가져오기
                if (internalSku && productMaster[internalSku]) {
                    samsungItemName = productMaster[internalSku].name;
                    vendorProductCode = productMaster[internalSku].vCode;
                }

                // 3. STANDARD_ORDERS 41개 컬럼 배열 생성
                const stdRow = new Array(41).fill("");
                const randomHash = Math.random().toString(36).substring(2, 8);

                stdRow[0]  = `재출고-${orderNo}-${randomHash}`; // order_id
                stdRow[1]  = channel;                          // channel
                stdRow[2]  = orderNo;                          // channel_order_no
                stdRow[3]  = subOrderNo;                       // channel_sub_order_no
                stdRow[7]  = vendorProductCode;                // vendor_product_code (이제 채워집니다!)
                stdRow[10] = rawItemName;                      // vendor_product_name
                stdRow[12] = internalSku;                      // internal_sku (이제 채워집니다!)
                stdRow[13] = samsungItemName;                  // samsung_item_name
                stdRow[14] = qty;                              // qty
                stdRow[15] = recipient;                        // recipient_name
                stdRow[16] = phone;                            // recipient_phone
                stdRow[17] = zipcode.padStart(5, '0');         // zipcode
                stdRow[18] = address;                          // address_raw
                stdRow[19] = address;                          // address_norm
                stdRow[20] = address;                          // address_final
                stdRow[21] = message;                          // delivery_message
                stdRow[25] = "READY";                          // status
                stdRow[29] = address.includes("제주") ? "TRUE" : "FALSE"; // is_jeju
                stdRow[32] = "[재출고]";                        // notes
                stdRow[33] = todayStr;                         // created_at

                outputRows.push(stdRow.join('\t'));
            }

            document.getElementById('outputData').value = outputRows.join('\n');
            document.getElementById('copyBtn').innerText = "✨ 변환 성공! 클릭하여 복사";
        }

        function copyToClipboard() {
            const output = document.getElementById('outputData');
            output.select();
            document.execCommand("copy");
            const btn = document.getElementById('copyBtn');
            btn.innerText = "✅ 복사되었습니다!";
            btn.style.backgroundColor = "#27ae60";
            setTimeout(() => { btn.innerText = "📋 결과 복사하기"; btn.style.backgroundColor = "#2ecc71"; }, 3000);
        }
    </script>
</body>
</html>
